services:
  nginx:
    image: navhub-nginx:${NGINX_TAG:-v1}
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    container_name: navhub-nginx
    ports:
      - "80:80"
      # - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: navhub-backend:${BACKEND_TAG:-v1}
    build:
      context: ../NavHub-Con
      dockerfile: ../deploy/backend/Dockerfile
    container_name: navhub-backend
    expose:
      - "8080"
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_ADDITIONAL_LOCATION: /app/config/
    volumes:
      - /nas/app/config:/app/config:ro
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:${MYSQL_TAG:-8.0.36}
    container_name: navhub-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-navhub}
      MYSQL_USER: ${MYSQL_USER:-navhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /nas/mysql/data:/var/lib/mysql
      # - /nas/mysql/conf:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
